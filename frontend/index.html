<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Learning Platform</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "react-router-dom": "https://esm.sh/react-router-dom@6.11.2?deps=react@18.2.0",
        "htm": "https://esm.sh/htm@3.1.1?deps=react@18.2.0",
        "chart.js/auto": "https://esm.sh/chart.js/auto",
        "jspdf": "https://esm.sh/jspdf@2.5.1"
      }
    }
    </script>
    
    <!-- AI Proctoring Models -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>
<body>
    <script>
        // Force clear corrupted local storage if requested
        if (window.location.search.includes('clear=true')) {
            try { localStorage.clear(); sessionStorage.clear(); window.location.href = '/'; } catch(e) {}
        }
        
        window.addEventListener('error', function(e) {
            fetch('/log_error?msg=' + encodeURIComponent(e.message + ' at ' + e.filename + ':' + e.lineno));
        });
        window.addEventListener('unhandledrejection', function(e) {
            fetch('/log_error?msg=' + encodeURIComponent('Unhandled Promise: ' + e.reason));
        });
    </script>

    <div id="root"></div>
    <script type="module" src="/app.js"></script>
</body>
</html>
